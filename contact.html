<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Harsh Vardhan Dubey</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background: #0f1117;
            color: #f5f7fa;
            overflow-x: hidden;
            cursor: none;
        }

        /* cursor */

        .cursor {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            position: fixed;
            background: radial-gradient(circle, #ff4d6d, #4cc9f0);
            box-shadow: 0 0 25px #ff4d6d;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 9999;
        }

        /* particles */

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -2;
            filter: blur(3px) brightness(1.1);
            opacity: .7;
        }

        /* navbar */

        nav {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            border-radius: 40px;
            background: rgba(255, 255, 255, .08);
            backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, .2);
            box-shadow: 0 20px 60px rgba(0, 0, 0, .5);
            z-index: 1000;
        }

        nav a {
            text-decoration: none;
            color: #d4d4d8;
            margin-left: 25px;
            font-size: 14px;
            transition: .3s;
        }

        nav a:hover {
            color: white;
        }

        .logo {
            font-weight: 600;
        }

        /* section */

        .section {
            width: 85%;
            max-width: 1200px;
            margin: 200px auto;
        }

        /* contact wrapper */

        .contact-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            background: rgba(255, 255, 255, .08);
            border: 1px solid rgba(255, 255, 255, .18);
            border-radius: 30px;
            padding: 70px;
            backdrop-filter: blur(50px);
            box-shadow: 0 40px 120px rgba(0, 0, 0, .6);
        }

        /* heading */

        h1 {
            font-size: 48px;
            background: linear-gradient(90deg, #ff4d6d, #4cc9f0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
            animation: glow 4s infinite alternate;
        }

        @keyframes glow {
            0% {
                filter: drop-shadow(0 0 5px #ff4d6d);
            }

            100% {
                filter: drop-shadow(0 0 15px #4cc9f0);
            }
        }

        .subtitle {
            color: #a1a1aa;
            margin-bottom: 40px;
        }

        /* form */

        .input-group {
            position: relative;
            margin-bottom: 30px;
        }

        .input-group input,
        .input-group textarea {
            width: 100%;
            padding: 14px;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, .2);
            background: rgba(255, 255, 255, .05);
            color: white;
            outline: none;
            transition: .3s;
        }

        .input-group label {
            position: absolute;
            top: 14px;
            left: 15px;
            color: #aaa;
            pointer-events: none;
            transition: .3s;
        }

        .input-group input:focus,
        .input-group textarea:focus {
            border: 1px solid #4cc9f0;
            box-shadow: 0 0 15px rgba(76, 201, 240, .4);
        }

        .input-group input:focus+label,
        .input-group input:not(:placeholder-shown)+label,
        .input-group textarea:focus+label,
        .input-group textarea:not(:placeholder-shown)+label {
            top: -10px;
            left: 10px;
            font-size: 12px;
            color: #4cc9f0;
            background: #0f1117;
            padding: 0 6px;
        }

        /* button */

        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 40px;
            background: linear-gradient(90deg, #ff4d6d, #4cc9f0);
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: .3s;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 40px rgba(76, 201, 240, .5);
        }

        /* info side */

        .info {
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 25px;
        }

        .info-card {
            background: rgba(255, 255, 255, .05);
            padding: 25px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, .1);
            transition: .4s;
        }

        .info-card:hover {
            transform: translateY(-8px);
            background: linear-gradient(90deg, #ff4d6d22, #4cc9f022);
        }

        /* social */

        .social {
            margin-top: 10px;
        }

        .social a {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 50px;
            height: 50px;
            margin-right: 15px;
            border-radius: 50%;
            background: rgba(255, 255, 255, .08);
            border: 1px solid rgba(255, 255, 255, .2);
            font-size: 20px;
            color: white;
            transition: .4s;
        }

        .social a:hover {
            background: linear-gradient(135deg, #ff4d6d, #4cc9f0);
            box-shadow: 0 0 25px rgba(76, 201, 240, .6);
            transform: translateY(-5px) scale(1.1);
        }

        /* footer */

        .footer {
            text-align: center;
            margin-top: 120px;
            color: #94a3b8;
            padding-bottom: 60px;
        }

        /* ===== TABLET ===== */

        @media(max-width:900px) {

            body {
                cursor: auto;
            }

            nav {
                width: 95%;
                padding: 12px 20px;
            }

            nav a {
                font-size: 12px;
                margin-left: 12px;
            }

            .section {
                width: 92%;
                margin: 140px auto;
            }

            .contact-wrapper {
                grid-template-columns: 1fr;
                padding: 40px;
                gap: 40px;
            }

            h1 {
                font-size: 36px;
                text-align: center;
            }

            .subtitle {
                text-align: center;
                font-size: 14px;
            }

            .info-card {
                text-align: center;
            }

            .social {
                display: flex;
                justify-content: center;
                flex-wrap: wrap;
                gap: 12px;
            }

            .social a {
                margin: 0;
                width: 45px;
                height: 45px;
                font-size: 18px;
            }

            .footer {
                margin-top: 80px;
                font-size: 14px;
            }

        }

        /* ===== MOBILE ===== */

        @media(max-width:480px) {

            nav {
                display: none;
            }

            .section {
                margin: 110px auto;
            }

            .contact-wrapper {
                padding: 25px;
            }

            h1 {
                font-size: 28px;
            }

            .input-group input,
            .input-group textarea {
                font-size: 14px;
                padding: 12px;
            }

            button {
                padding: 14px;
                font-size: 15px;
            }

            .info-card {
                font-size: 14px;
            }

        }
    </style>
</head>

<body>

    <canvas id="particles"></canvas>
    <div class="cursor"></div>

    <nav>
        <div class="logo">codewthharsh</div>
        <div>
            <a href="index.html">Home</a>
            <a href="index.html#projects">Projects</a>
            <a href="contact.html">Contact</a>
        </div>
    </nav>

            <div class="info">

                </div>

                <div class="info-card">
                    <h3>Location</h3>
                    <p>Lucknow, India</p>
                </div>

                <div class="social">

                    <a href="https://www.linkedin.com/in/harsh-vardhan-dubey-9700722a8" style="text-decoration: none;"
                        target="_blank">
                        <i class="fa-brands fa-linkedin-in"></i>
                    </a>

                    <a href="https://www.instagram.com/codewthharsh" style="text-decoration: none;" target="_blank">
                        <i class="fa-brands fa-instagram"></i>
                    </a>

                    <a href="https://www.youtube.com/@codewthharsh" style="text-decoration: none;" target="_blank">
                        <i class="fa-brands fa-youtube"></i>
                    </a>

                </div>

            </div>

        </div>

    </div>

    <div class="footer">© 2026 Harsh Vardhan Dubey</div>

    <script>

        const cursor = document.querySelector(".cursor")

        document.addEventListener("mousemove", e => {
            cursor.style.left = e.clientX + "px"
            cursor.style.top = e.clientY + "px"
        })

        function showSuccess(e) {
            e.preventDefault()
            alert("Message Sent Successfully 🚀")
        }

    </script>

</body>

</html>
